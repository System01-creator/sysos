<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SysOS Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
<style>
body {
    background: black;
    color: #00ff00;
    font-family: 'VT323', monospace;
    font-size: 22px;
    margin: 0;
    padding: 0;
    text-shadow: 0 0 5px #00ff00;
}

/* HEADER */
#header {
    border-bottom: 2px solid #00ff00;
    padding: 10px 20px;
    font-size: 28px;
    letter-spacing: 2px;
}

#terminal {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

.line {
    display: flex;
}

.prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #00ff00;
    font-family: inherit;
    font-size: inherit;
    flex: 1;
}

/* scanlines */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
}
</style>
</head>

<body>

<div id="header">[ SysOS v3.5 ] :: Database Interface</div>
<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

/* 🟢 LORE DATABASE */
const database = {
    "entry_001": {
        title: "World: Aether-9",
        locked: false,

        entities: {
            "entity_01": {
                name: "Watcher",
                desc: "Observes but never interacts."
            }
        },

        locations: {
            "loc_01": {
                name: "Glass Desert",
                desc: "A desert turned to crystal after the Collapse."
            }
        }
    },

    "entry_002": {
        title: "Project Aether",
        locked: true,
        key: "override",

        entities: {
            locked: true,
            key: "alpha",
            data: {name, desc}
        },
        locations: {},

        encrypted: "QEB NRFZH YOLTK CLU GRJMP LSBO QEB IXWV ALD"
    }
};

/* 🟢 COMMANDS */
const commands = {

help: () => `
COMMANDS:
list                - list entries
open [entry]        - open entry
back                - go back
list [category]     - list entities/locations
view [id]           - view item
decrypt [entry] key - decrypt entry
clear               - clear terminal
`,

list: (args) => {
    // no context → list entries
    if (!currentEntry) {
        return Object.keys(database)
            .map(id => `${id} - ${database[id].title}`)
            .join("\n");
    }

    // inside entry → list categories
    if (!args[0]) {
        return "Categories: entities, locations";
    }
    const categoryData = database[currentEntry][category];

    if (categoryData._locked) {
        return "ACCESS DENIED.";
    }
    
    const items = categoryData.data || categoryData;

    const category = args[0];

    if (!database[currentEntry][category]) {
        return "Category not found.";
    }

    currentCategory = category;

    const items = database[currentEntry][category];

    return Object.keys(items)
        .map(id => `${id} - ${items[id].name}`)
        .join("\n") || "Empty.";
},

open: (args) => {
    const id = args[0];
    const entry = database[id];

    if (!entry) return "Entry not found.";

    if (entry.locked) {
        return `[${id}] ${entry.title}\n\n[ENCRYPTED]\nUse decrypt ${id} [key]`;
    }

    currentEntry = id;
    currentCategory = null;
    if (!entry.locked && !entry.entities["entity_secret"]) {
        entry.entities["entity_secret"] = {
        name: "???",
        desc: "Something is watching through the system."
    };
    }
    return `Opened ${entry.title}`;
},

view: async (args) => {
    if (!currentEntry || !currentCategory) {
        return "Open an entry and category first.";
    }

    const item = database[currentEntry][currentCategory][args[0]];

    if (!item) return "Item not found.";

    await printOutput(`${item.name}\n\n${item.desc}`);
    return "";
},

back: () => {
    if (currentCategory) {
        currentCategory = null;
        return "Exited category.";
    }

    if (currentEntry) {
        currentEntry = null;
        return "Exited entry.";
    }

    return "Already at root.";
},

decrypt: async (args) => {
    const [id, key] = args;
    const entry = database[id];

    if (!entry) return "Entry not found.";
    if (!entry.locked) return "Already decrypted.";

    if (key !== entry.key) {
        return "Invalid key.";
    }

    await typeLine("Decrypting...");
    await new Promise(r => setTimeout(r, 400));

    entry.locked = false;
    entry.content = decryptText(entry.encrypted);

    return "Decryption successful.";
},

clear: () => {
    terminal.innerHTML = "";
    return "";
}

};

function getPrompt() {
    let path = "SYS";

    if (currentEntry) path += `/${currentEntry}`;
    if (currentCategory) path += `/${currentCategory}`;

    return path + "> ";
}



/* 🟢 TERMINAL ENGINE */
function createInputLine() {
    const line = document.createElement("div");
    line.className = "line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = getPrompt();

    const input = document.createElement("input");
    input.autofocus = true;

    line.appendChild(prompt);
    line.appendChild(input);
    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const value = input.value;
            handleCommand(value);
            
            input.value = value;
            input.disabled = true;
            createInputLine();
        }
    });
}

/*
function printOutput(text) {
    if (!text) return;

    const div = document.createElement("div");
    div.textContent = text;
    terminal.appendChild(div);
}
*/
async function printOutput(text) {
    if (!text) return;

    const lines = text.split("\n");

    for (const line of lines) {
        await typeLine(line);
    }
}
  /*
function handleCommand(input) {
    const parts = input.trim().split(" ");
    const cmd = parts[0];
    const args = parts.slice(1);

    if (commands[cmd]) {
        const output = commands[cmd](args);
        printOutput(output);
    } else if (cmd !== "") {
        printOutput("Unknown command. Type 'help'.");
    }
}
    */
const typeSound = document.getElementById("typeSound");

function playTypeSound() {
    typeSound.currentTime = 0;
    typeSound.play();
}

function typeLine(text, speed = 25) {
    return new Promise(resolve => {
        const div = document.createElement("div");
        terminal.appendChild(div);

        let i = 0;
        function type() {
            if (i < text.length) {
                div.textContent += text.charAt(i);

                // less spammy sound
                if (i % 2 === 0) playTypeSound();

                i++;
                setTimeout(type, speed);
            } else {
                resolve();
            }
        }
        type();
    });
}

async function handleCommand(input) {
    const parts = input.trim().split(" ");
    const cmd = parts[0];
    const args = parts.slice(1);

    if (commands[cmd]) {
        const output = await commands[cmd](args);
        await printOutput(output);
    } else if (cmd !== "") {
        await printOutput("Unknown command. Type 'help'.");
    }

/* 🟢 BOOT SEQUENCE */
async function boot() {
    await typeLine("Initializing SysOS...");
    await typeLine("Loading core modules...");
    await typeLine("Establishing connection...");
    await typeLine("Access level: USER");
    await typeLine(" ");
    await typeLine("Type 'help' to begin.\n");

    createInputLine();
}
    
let currentEntry = null;
let currentCategory = null;
    
boot();
</script>

</body>
    <audio id="typeSound" src="https://www.soundjay.com/mechanical/typewriter-key-1.mp3" preload="auto"></audio>
</html>
