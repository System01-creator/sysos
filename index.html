#terminal {

}

.line {

}

.prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: inherit;
    font-size: inherit;
    flex: 1;
}

/* scanlines */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
}

/* 🟢 COMMANDS */
const commands = {

help: () => `
COMMANDS:
list                - list entries
open [entry]        - open entry
back                - go back
list [category]     - list entities/locations
view [id]           - view item
decrypt [entry] key - decrypt entry
decrypt [entry] [category] [key] -- decrypt catagory
clear               - clear terminal
`,

list: (args) => {
    // ROOT → list entries
    if (!currentEntry) {
        return Object.keys(database)
            .map(id => `${id} - ${database[id].title}`)
            .join("\n");
}

    // INSIDE ENTRY → show categories
    else if (!args[0]) {
        return Object.keys(database[currentEntry])
        .filter(k => typeof database[currentEntry][k] === "object")
        .map(k => {
            const cat = database[currentEntry][k];
            return cat.locked ? `${k} [LOCKED]` : k;
        })
        .join("\n");
    }

    const category = args[0];
    const categoryData = database[currentEntry][category];

    if (!categoryData) {
        return "Category not found.";
    }

    if (categoryData.locked) {
        return "ACCESS DENIED.";
    }

    currentCategory = category;

    // Support both normal + "data" structure
    const items = categoryData.data || categoryData;

    return Object.keys(items)
        .map(id => `${id} - ${items[id].name}`)
        .join("\n") || "Empty.";
},

open: (args) => {
    const id = args[0];
    const entry = database[id];

    if (!entry) return "Entry not found.";

    if (entry.locked) {
        return `[${id}] ${entry.title}\n\n[ENCRYPTED]\nUse decrypt ${id} [key]`;
    }

    currentEntry = id;
    currentCategory = null;
    if (!entry.locked && !entry.entities["entity_secret"]) {
        entry.entities["entity_secret"] = {
        name: "???",
        desc: "Something is watching through the system."
    };
    }
    return `Opened ${entry.title}`;
},

view: async (args) => {
    if (!currentEntry || !currentCategory) {
        return "Open an entry and category first.";
    }

    const categoryData = database[currentEntry][currentCategory];

    if (categoryData.locked) {
        return "ACCESS DENIED.";
    }

    const items = categoryData.data || categoryData;
    const item = items[args[0]];

    if (!item) return "Item not found.";

    await printOutput(`${item.name}\n\n${item.desc}`);
    return "";
},

back: () => {
    if (currentCategory) {
        currentCategory = null;
        return "Exited category.";
    }

    if (currentEntry) {
        currentEntry = null;
        return "Exited entry.";
    }

    return "Already at root.";
},

decrypt: async (args) => {
    const entryId = args[0];
    const entry = database[entryId];

    if (!entry) return "Entry not found.";

    // Entry 
    if (args.length === 2) {
        const key = args[1];

        if (!entry.locked) return "Already decrypted.";

        if (key !== entry.key) {
            return "Invalid key.";
        }

        await typeLine("Decrypting entry...");
        await new Promise(r => setTimeout(r, 400));

        entry.locked = false;
        entry.content = decryptText(entry.encrypted);

        return "Entry decrypted.";
    }

    // Category
    if (args.length === 3) {
        const category = args[1];
        const key = args[2];

        const categoryData = entry[category];

        if (!categoryData) return "Category not found.";

        if (!categoryData.locked) {
            return "Category already unlocked.";
        }

        if (key !== categoryData.key) {
            return "Invalid key.";
        }

        await typeLine(`Decrypting ${category}...`);
        await new Promise(r => setTimeout(r, 400));

        categoryData.locked = false;

        if (category === "entities" && Object.keys(categoryData.data).length === 0) {
            categoryData.data["entity_hidden"] = {
                name: "Observer-23",
                desc: "It becomes aware when you access it."
            };
        }

        return `${category} unlocked.`;
    }

    return "Usage: decrypt [entry] [key] OR decrypt [entry] [category] [key]";
},

 clear:() => {
    terminal.innerHTML = "";
    return "";
}

};

function getPrompt() {
    let path = "SYS";

    if (currentEntry) path += `/${currentEntry}`;
    if (currentCategory) path += `/${currentCategory}`;

    return path + "> ";
}

function decryptText(text) {
    return text.replace(/[A-Z]/g, c =>
        String.fromCharCode((c.charCodeAt(0) - 65 - 3 + 26) % 26 + 65)
    );
}

/*  TERMINAL ENGINE */
function createInputLine() {
    const line = document.createElement("div");
    line.className = "line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = getPrompt();

    const input = document.createElement("input");
    input.autofocus = true;

    line.appendChild(prompt);
    line.appendChild(input);
    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const value = input.value;
            handleCommand(value);
            
            input.value = value;
            input.disabled = true;
            createInputLine();
        }
    });
}
async function printOutput(text) {
    if (!text) return;

    const lines = text.split("\n");

    for (const line of lines) {
        await typeLine(line);
    }
}

const typeSound = document.getElementById("typeSound");

function playTypeSound() {
    typeSound.currentTime = 0;
    typeSound.play();
}

function typeLine(text, speed = 25) {
    return new Promise(resolve => {
        const div = document.createElement("div");
        terminal.appendChild(div);

        let i = 0;
        function type() {
            if (i < text.length) {
                div.textContent += text.charAt(i);

                // less spammy sound
                if (i % 2 === 0) playTypeSound();

                i++;
                setTimeout(type, speed);
            } else {
                resolve();
            }
        }
        type();
    });
}

async function handleCommand(input) {
    const parts = input.trim().split(" ");
    const cmd = parts[0];
    const args = parts.slice(1);

    if (commands[cmd]) {
        const output = await commands[cmd](args);
        await printOutput(output);
    } else if (cmd !== "") {
        await printOutput("Unknown command. Type 'help'.");
    }
}

let commandHistory = [];
let historyIndex = -1;

/* BOOT SEQUENCE */
async function boot() {
    await typeLine("Initializing SysOS...");
    await typeLine("Loading core modules...");
    await typeLine("Establishing connection...");
    await typeLine("Access level: USER");
    await typeLine(" ");
    await typeLine("Type 'help' to begin.\n");

    createInputLine();
}
