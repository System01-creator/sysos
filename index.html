<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SysOS Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: #00ff00;
    font-family: 'VT323', monospace;
    font-size: 22px;
    margin: 0;
    padding: 0;
    text-shadow: 0 0 5px #00ff00;
}

/* HEADER */
#header {
    border-bottom: 2px solid #00ff00;
    padding: 10px 20px;
    font-size: 28px;
    letter-spacing: 2px;
}

#terminal {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

.line {
    display: flex;
}

.prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #00ff00;
    font-family: inherit;
    font-size: inherit;
    flex: 1;
}

/* scanlines */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
}
</style>
</head>

<body>

<div id="header">[ SysOS v3.5 ] :: Database Interface</div>
<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

/* 🟢 LORE DATABASE */
const database = {
    "entry_001": {
        title: "The Collapse",
        content: "Year 2087. Global systems failed simultaneously. Cause unknown."
    },
    "entry_002": {
        title: "Project Aether",
        content: "An experimental system designed to simulate alternate realities."
    },
    "entry_003": {
        title: "The Operators",
        content: "Unknown individuals with direct access to SysOS core functions."
    }
};

/* 🟢 COMMANDS */
const commands = {

    help: () => `
COMMAND LIST:
help        - show commands
list        - list all entries
view [id]   - open entry
search [x]  - search keyword
clear       - clear terminal
`,

    list: () => {
        return Object.keys(database)
            .map(id => `${id} - ${database[id].title}`)
            .join("\n");
    },

    view: (args) => {
        const id = args[0];
        if (!database[id]) return "Entry not found.";

        return `[${id}] ${database[id].title}\n\n${database[id].content}`;
    },

    search: (args) => {
        const query = args.join(" ").toLowerCase();

        const results = Object.entries(database)
            .filter(([id, data]) =>
                data.title.toLowerCase().includes(query) ||
                data.content.toLowerCase().includes(query)
            )
            .map(([id, data]) => `${id} - ${data.title}`);

        return results.length ? results.join("\n") : "No matches found.";
    },

    clear: () => {
        terminal.innerHTML = "";
        return "";
    }
};

/* 🟢 TERMINAL ENGINE */
function createInputLine() {
    const line = document.createElement("div");
    line.className = "line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = "SYS> ";

    const input = document.createElement("input");
    input.autofocus = true;

    line.appendChild(prompt);
    line.appendChild(input);
    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const value = input.value;
            handleCommand(value);

            input.disabled = true;
            createInputLine();
        }
    });
}

function printOutput(text) {
    if (!text) return;

    const div = document.createElement("div");
    div.textContent = text;
    terminal.appendChild(div);
}

function handleCommand(input) {
    const parts = input.trim().split(" ");
    const cmd = parts[0];
    const args = parts.slice(1);

    if (commands[cmd]) {
        const output = commands[cmd](args);
        printOutput(output);
    } else if (cmd !== "") {
        printOutput("Unknown command. Type 'help'.");
    }
}

/* 🟢 BOOT SEQUENCE */
function boot() {
    printOutput("Initializing SysOS...");
    printOutput("Connecting to archive...");
    printOutput("Access level: USER");
    printOutput("Type 'help' to begin.\n");

    createInputLine();
}

boot();
</script>

</body>
</html>
