<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: #00ff00;
    font-family: 'VT323', monospace;
    font-size: 22px;
    margin: 0;
    padding: 20px;
    text-shadow: 0 0 5px #00ff00;
}

#terminal {
    max-width: 900px;
    margin: auto;
}

.line {
    display: flex;
    flex-wrap: wrap;
}

.prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #00ff00;
    font-family: inherit;
    font-size: inherit;
    flex: 1;
}

/* scanlines */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
}
</style>
</head>

<body>
<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

let currentPath = "~";

const fileSystem = {
    "~": ["projects", "about.txt"],
    "projects": ["game.exe", "website.html"]
};

const commands = {
    help: () => {
        return "Available commands: help, ls, cd, clear, echo, about";
    },

    ls: () => {
        return fileSystem[currentPath].join("  ");
    },

    cd: (args) => {
        if (!args[0]) return "";
        if (args[0] === "..") {
            currentPath = "~";
            return "";
        }
        if (fileSystem[args[0]]) {
            currentPath = args[0];
            return "";
        }
        return "Directory not found";
    },

    clear: () => {
        terminal.innerHTML = "";
        return "";
    },

    echo: (args) => args.join(" "),

    about: () => {
        return "This is a fake terminal built for GitHub";
    }
};

function createInputLine() {
    const line = document.createElement("div");
    line.className = "line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = `user@web:${currentPath}$`;

    const input = document.createElement("input");
    input.autofocus = true;

    line.appendChild(prompt);
    line.appendChild(input);
    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const value = input.value;
            handleCommand(value);

            input.disabled = true;
            createInputLine();
        }
    });
}

function printOutput(text) {
    if (!text) return;
    const div = document.createElement("div");
    div.textContent = text;
    terminal.appendChild(div);
}

function handleCommand(input) {
    const parts = input.trim().split(" ");
    const cmd = parts[0];
    const args = parts.slice(1);

    if (commands[cmd]) {
        const output = commands[cmd](args);
        printOutput(output);
    } else if (cmd !== "") {
        printOutput(`Command not found: ${cmd}`);
    }
}

// boot message
printOutput("Booting system...");
printOutput("Welcome to Web Terminal");
printOutput("Type 'help' to begin.\n");

createInputLine();
</script>
</body>
</html>
